# Confirmation stage: assumes the app is ALREADY on the swap confirmation
# scene with a live quote (run swap-quote-input.yaml first). Slides the
# confirm slider (right -> left) and waits for the success scene.
appId: ${APP_ID}
env:
  APP_ID: co.edgesecure.app
---
- extendedWaitUntil:
    visible: "Slide to Confirm"
    timeout: 15000
- swipe:
    from:
      id: "confirmSliderThumb"
    direction: LEFT
    duration: 1500
- extendedWaitUntil:
    visible: "Congratulations!"
    timeout: 120000

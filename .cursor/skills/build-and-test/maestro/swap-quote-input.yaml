# Interaction flow: PIN login -> Exchange tab -> pick src/dst wallets ->
# enter fiat amount -> Next -> wait for quote -> force a specific provider.
# Capture/confirmation are driven separately (see swap-confirm.yaml) so the
# caller can screenshot/inspect between stages.
appId: ${APP_ID}
env:
  APP_ID: co.edgesecure.app
  PIN_DIGIT: "1"
  FIAT_AMOUNT: "16"
  SRC_WALLET: ".*Bitcoin.*"
  DST_WALLET: ".*Ethereum.*"
  PROVIDER: "Maya Protocol"
---
- launchApp
- extendedWaitUntil:
    visible: "Exit PIN"
    timeout: 40000
- assertVisible: "1"
- tapOn:
    text: ${PIN_DIGIT}
    waitToSettleTimeoutMs: 900
- tapOn:
    text: ${PIN_DIGIT}
    waitToSettleTimeoutMs: 900
- tapOn:
    text: ${PIN_DIGIT}
    waitToSettleTimeoutMs: 900
- tapOn:
    text: ${PIN_DIGIT}
    waitToSettleTimeoutMs: 1500
- extendedWaitUntil:
    visible: "Exchange"
    timeout: 30000
- runFlow:
    when:
      visible: "Security is Our Priority"
    commands:
      - tapOn: "Cancel"
- runFlow:
    when:
      visible: "How Did You Discover Edge?"
    commands:
      - tapOn: "Dismiss"
- runFlow:
    when:
      visible: "Claim Your Web3 Handle"
    commands:
      - tapOn: "Not Now"
- tapOn: "Exchange"
- runFlow:
    when:
      visible: "Select Source Wallet"
    commands:
      - tapOn: "Select Source Wallet"
      - extendedWaitUntil:
          visible: ${SRC_WALLET}
          timeout: 15000
      - tapOn:
          text: ${SRC_WALLET}
          index: 0
- runFlow:
    when:
      visible: "Select Receiving Wallet"
    commands:
      - tapOn: "Select Receiving Wallet"
      - extendedWaitUntil:
          visible: ${DST_WALLET}
          timeout: 15000
      - tapOn:
          text: ${DST_WALLET}
          index: 0
- extendedWaitUntil:
    visible: "Tap to edit"
    timeout: 15000
- tapOn:
    text: "Tap to edit"
    index: 0
- inputText: ${FIAT_AMOUNT}
- tapOn: "Next"
- extendedWaitUntil:
    visible: "Powered by .*"
    timeout: 45000
- runFlow:
    when:
      notVisible: ${PROVIDER}
    commands:
      - tapOn:
          text: "Powered by .*"
      - extendedWaitUntil:
          visible: "Select Swap Provider"
          timeout: 10000
      - tapOn:
          text: ${PROVIDER}
      - extendedWaitUntil:
          visible: "Powered by .*"
          timeout: 45000
